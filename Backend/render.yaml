# ─────────────────────────────────────────────────────────────────────────────
# render.yaml — Render Blueprint
# Put this in the ROOT of your backend repo.
# Render will auto-detect this and configure everything for you.
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: stock-prediction-api
    env: python
    region: singapore          # change to your nearest region if needed
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
